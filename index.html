<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전동킥보드 안전 캠페인 시뮬레이터</title>
  
  <!-- 1. Tailwind CSS 불러오기 (설치 필요 없음) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. React 불러오기 (설치 필요 없음) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- 3. Babel 불러오기 (JSX 코드를 브라우저가 읽게 해줌) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
  <!-- 이곳에 앱이 렌더링 됩니다 -->
  <div id="root"></div>

  <!-- 여기서부터 React 코드 시작 -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      // --- 상태 관리 ---
      const [speedKmh, setSpeedKmh] = useState(20);
      const [isAnimating, setIsAnimating] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);

      // --- 물리 상수 및 계산 ---
      const reactionTime = 1.0; // 반응 시간 (초)
      const deceleration = 3.0; // 감속 가속도 (m/s^2)
      const obstacleDistance = 12; // 전방 보행자 위치 (m)

      const speedMs = speedKmh / 3.6; // km/h -> m/s 변환
      const brakingTime = speedMs / deceleration; // 브레이크 밟은 후 멈출 때까지 걸리는 시간
      const totalTime = reactionTime + brakingTime; // 총 정지 시간

      const reactionDist = speedMs * reactionTime; // 공주 거리 (반응 시간 동안 등속 이동)
      const brakingDist = (speedMs * speedMs) / (2 * deceleration); // 제동 거리 (등가속도 감속 이동)
      const totalDist = reactionDist + brakingDist; // 총 정지 거리

      const isCrashed = totalDist >= obstacleDistance; // 충돌 여부

      // --- 아주 안전한 애니메이션 처리 로직 ---
      useEffect(() => {
        let animationFrameId;
        let lastTime;

        const renderLoop = (time) => {
          if (lastTime === undefined) lastTime = time;
          const deltaTime = (time - lastTime) / 1000;
          lastTime = time;

          setCurrentTime((prevTime) => {
            const nextTime = prevTime + deltaTime;
            if (nextTime >= totalTime) {
              setIsAnimating(false); // 여기서 바로 애니메이션 종료 처리
              return totalTime; 
            }
            return nextTime;
          });

          if (isAnimating) {
            animationFrameId = requestAnimationFrame(renderLoop);
          }
        };

        if (isAnimating) {
          animationFrameId = requestAnimationFrame(renderLoop);
        }

        return () => {
          if (animationFrameId) {
            cancelAnimationFrame(animationFrameId);
          }
        };
      }, [isAnimating, totalTime]);

      // 버튼 핸들러
      const handleStart = () => {
        setCurrentTime(0);
        setIsAnimating(true);
      };

      const handleReset = () => {
        setIsAnimating(false);
        setCurrentTime(0);
      };

      // 현재 시간에 따른 킥보드 위치 계산
      const currentPos = currentTime <= reactionTime
        ? speedMs * currentTime
        : reactionDist + (speedMs * (currentTime - reactionTime) - 0.5 * deceleration * Math.pow(currentTime - reactionTime, 2));

      // --- 렌더링 값 계산 ---
      const scale = 25; // 1m = 25px
      
      // SVG 그래프 맵핑
      const xMax = 6;  // 최대 6초
      const yMax = 15; // 최대 15m/s
      const p0x = 0;
      const p0y = 100 - (speedMs / yMax) * 100;
      const p1x = (reactionTime / xMax) * 100;
      const p1y = p0y;
      const p2x = (totalTime / xMax) * 100;
      const p2y = 100;

      return (
        <div className="min-h-screen text-slate-800 p-4 md:p-8 font-sans">
          <div className="max-w-6xl mx-auto space-y-8">
            
            {/* 헤더 */}
            <header className="bg-white rounded-3xl shadow-lg p-8 text-center border border-slate-100 relative overflow-hidden">
              <div className="absolute w-64 h-64 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10" style={{ top: '-6rem', right: '-6rem' }}></div>
              <div className="absolute w-64 h-64 bg-red-400 rounded-full mix-blend-multiply filter blur-3xl opacity-10" style={{ bottom: '-6rem', left: '-6rem' }}></div>
              
              <h1 className="text-3xl md:text-5xl font-extrabold text-slate-900 mb-4 tracking-tighter">
                전동킥보드 <span className="text-blue-600">20km/h</span>의 과학
              </h1>
              <p className="text-slate-500 text-lg md:text-xl font-medium">
                고등학교 물리학 v-t 그래프 기반 스쿨존 안전 캠페인 시뮬레이터
              </p>
            </header>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              
              {/* 메인: 애니메이션 & 그래프 */}
              <div className="lg:col-span-2 space-y-8">
                
                {/* 1. 도로 주행 시뮬레이터 */}
                <div className="bg-white rounded-3xl shadow-lg overflow-hidden border border-slate-100">
                  <div className="bg-gradient-to-b from-slate-700 to-slate-900 h-48 relative w-full overflow-hidden flex items-center">
                    
                    {/* 점선 */}
                    <div className="absolute top-1/2 left-0 w-full h-1 border-t-4 border-dashed border-yellow-400 opacity-50 transform -translate-y-1/2"></div>
                    
                    {/* 킥보드 */}
                    <div 
                      className="absolute bottom-6 transition-transform duration-75 z-10"
                      style={{ transform: `translateX(${20 + currentPos * scale}px)` }}
                    >
                      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="18" cy="19" r="2" fill="white"/>
                        <circle cx="6" cy="19" r="2" fill="white"/>
                        <path d="M6 19h12 M18 19l-2-12 M16 7h3 M16 7l-4 0" />
                        <circle cx="12" cy="4" r="2" fill="#60A5FA"/>
                        <path d="M12 6v6 M12 8l3 3" />
                      </svg>
                      {/* 속도 표시 */}
                      <div className="absolute bg-white text-slate-900 font-bold text-xs px-3 py-1.5 rounded-full shadow-md whitespace-nowrap border border-slate-200" style={{ top: '-2rem', left: '-0.5rem' }}>
                        {currentTime <= reactionTime ? speedKmh : Math.max(0, (speedMs - deceleration * (currentTime - reactionTime)) * 3.6).toFixed(0)} km/h
                      </div>
                    </div>

                    {/* 장애물 */}
                    <div className="absolute bottom-6" style={{ left: `${20 + obstacleDistance * scale}px` }}>
                      <svg width="36" height="48" viewBox="0 0 24 24" fill="none" stroke={isCrashed && currentTime >= totalTime ? "#EF4444" : "#FBBF24"} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                        <circle cx="12" cy="5" r="2" />
                        <path d="M12 7v7 M9 10h6 M9 20l3-6 3 6" />
                      </svg>
                      <div className="absolute bg-yellow-400 text-yellow-900 text-xs px-3 py-1.5 rounded-full font-bold whitespace-nowrap shadow-md" style={{ top: '-2.5rem', left: '-1.5rem' }}>
                        전방 12m 보행자
                      </div>
                    </div>

                    {/* 충돌 이펙트 */}
                    {isCrashed && currentTime >= totalTime && (
                      <div className="absolute font-black text-3xl text-red-500 animate-bounce" style={{ bottom: '2.5rem', left: `${20 + obstacleDistance * scale - 15}px` }}>
                        💥 충돌!
                      </div>
                    )}
                  </div>
                  
                  {/* 거리 마커 */}
                  <div className="bg-white h-10 flex relative text-xs text-slate-400 font-mono font-medium border-t border-slate-100">
                    <div className="absolute top-2" style={{ left: '20px' }}>0m</div>
                    <div className="absolute top-2" style={{ left: `${20 + 5 * scale}px` }}>5m</div>
                    <div className="absolute top-2" style={{ left: `${20 + 10 * scale}px` }}>10m</div>
                    <div className="absolute top-2 font-bold text-red-500" style={{ left: `${20 + obstacleDistance * scale}px` }}>12m (장애물)</div>
                    <div className="absolute top-2" style={{ left: `${20 + 15 * scale}px` }}>15m</div>
                    <div className="absolute top-2" style={{ left: `${20 + 20 * scale}px` }}>20m</div>
                  </div>
                </div>

                {/* 2. v-t 그래프 */}
                <div className="bg-white p-8 rounded-3xl shadow-lg border border-slate-100 mt-8">
                  <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center">
                    <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center mr-3">
                      <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M7 12l3-3 3 3 4-4M8 21l4-4 4 4M3 4h18M4 4h16v12a1 1 0 01-1 1H5a1 1 0 01-1-1V4z" />
                      </svg>
                    </div>
                    v-t (속도-시간) 그래프 분석
                  </h3>
                  
                  <div className="relative w-full h-72 border-l-2 border-b-2 border-slate-300 ml-4 mb-4">
                    <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="w-full h-full overflow-visible">
                      <defs>
                        <linearGradient id="reactionGrad" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stopColor="#fef08a" stopOpacity="0.8"/>
                          <stop offset="100%" stopColor="#fef08a" stopOpacity="0.1"/>
                        </linearGradient>
                        <linearGradient id="brakingGrad" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="0%" stopColor="#fecaca" stopOpacity="0.8"/>
                          <stop offset="100%" stopColor="#fecaca" stopOpacity="0.1"/>
                        </linearGradient>
                      </defs>

                      {/* 그리드 */}
                      <line x1="0" y1="20" x2="100" y2="20" stroke="#f1f5f9" strokeWidth="1" strokeDasharray="4" vectorEffect="non-scaling-stroke" />
                      <line x1="0" y1="40" x2="100" y2="40" stroke="#f1f5f9" strokeWidth="1" strokeDasharray="4" vectorEffect="non-scaling-stroke" />
                      <line x1="0" y1="60" x2="100" y2="60" stroke="#f1f5f9" strokeWidth="1" strokeDasharray="4" vectorEffect="non-scaling-stroke" />
                      <line x1="0" y1="80" x2="100" y2="80" stroke="#f1f5f9" strokeWidth="1" strokeDasharray="4" vectorEffect="non-scaling-stroke" />

                      {/* 면적 (공주거리) */}
                      <polygon 
                        points={`0,100 0,${p0y} ${p1x},${p1y} ${p1x},100`} 
                        fill="url(#reactionGrad)" stroke="#eab308" strokeWidth="1.5" strokeDasharray="4,4" vectorEffect="non-scaling-stroke" 
                      />
                      
                      {/* 면적 (제동거리) */}
                      <polygon 
                        points={`${p1x},100 ${p1x},${p1y} ${p2x},100`} 
                        fill="url(#brakingGrad)" stroke="#ef4444" strokeWidth="1.5" strokeDasharray="4,4" vectorEffect="non-scaling-stroke" 
                      />
                      
                      {/* 선 (그래프 라인) */}
                      <polyline 
                        points={`0,${p0y} ${p1x},${p1y} ${p2x},${p2y}`} 
                        fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" vectorEffect="non-scaling-stroke" 
                      />
                    </svg>

                    {/* 면적 글씨 */}
                    <div className="absolute text-yellow-600 font-extrabold text-sm tracking-tight transform -translate-x-1/2 bg-white px-1.5 rounded" style={{ left: `${p1x / 2}%`, top: '75%' }}>
                      공주거리
                    </div>
                    <div className="absolute text-red-600 font-extrabold text-sm tracking-tight transform -translate-x-1/2 bg-white px-1.5 rounded" style={{ left: `${p1x + (p2x - p1x) / 2}%`, top: '85%' }}>
                      제동거리
                    </div>

                    {/* 라벨들 */}
                    <div className="absolute text-xs font-semibold text-slate-400" style={{ left: '-2.5rem', top: '0' }}>15m/s</div>
                    <div className="absolute text-xs font-bold text-slate-600 transform -rotate-90" style={{ left: '-3.5rem', top: '45%' }}>속도 (v)</div>
                    <div className="absolute text-xs font-semibold text-slate-400" style={{ left: '-1.5rem', bottom: '0' }}>0</div>

                    <div className="absolute text-xs font-bold text-slate-600 transform -translate-x-1/2" style={{ bottom: '-2rem', left: '50%' }}>시간 (t)</div>
                    <div className="absolute text-xs text-slate-400 font-semibold transform -translate-x-1/2" style={{ bottom: '-1.5rem', left: '16.6%' }}>1s (반응)</div>
                    <div className="absolute text-xs text-slate-400 font-semibold transform -translate-x-1/2" style={{ bottom: '-1.5rem', left: '33.3%' }}>2s</div>
                    <div className="absolute text-xs text-slate-400 font-semibold transform -translate-x-1/2" style={{ bottom: '-1.5rem', left: '50%' }}>3s</div>
                    <div className="absolute text-xs text-slate-400 font-semibold transform -translate-x-1/2" style={{ bottom: '-1.5rem', left: '66.6%' }}>4s</div>
                    <div className="absolute text-xs text-slate-400 font-semibold transform translate-x-1/2" style={{ bottom: '-1.5rem', right: '0' }}>6s</div>
                  </div>
                </div>
              </div>

              {/* 오른쪽: 조작 & 설명 패널 */}
              <div className="space-y-8">
                
                {/* 조작 패널 */}
                <div className="bg-white p-8 rounded-3xl shadow-lg border border-slate-100">
                  <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center">
                    <span className="text-2xl mr-2">⚙️</span> 시뮬레이터 조작
                  </h3>
                  
                  <div className="mb-8">
                    <div className="flex justify-between items-center mb-4">
                      <label className="font-bold text-slate-600">초기 속도 (km/h)</label>
                      <span className={`text-2xl font-black px-3 py-1 rounded-lg ${speedKmh > 20 ? 'bg-red-50 text-red-600' : 'bg-green-50 text-green-600'}`}>
                        {speedKmh} <span className="text-sm font-medium">km/h</span>
                      </span>
                    </div>
                    <input 
                      type="range" 
                      min="10" 
                      max="40" 
                      step="1" 
                      value={speedKmh} 
                      onChange={(e) => {
                        setSpeedKmh(Number(e.target.value));
                        handleReset(); 
                      }}
                      disabled={isAnimating}
                      className="w-full h-3 bg-slate-200 rounded-full appearance-none cursor-pointer accent-blue-600 disabled:opacity-50"
                    />
                    <div className="flex justify-between text-sm font-semibold text-slate-400 mt-2 px-1">
                      <span>10 (안전)</span>
                      <span>20 (권장)</span>
                      <span>40 (위험)</span>
                    </div>
                  </div>

                  <div className="grid grid-cols-2 gap-4 mb-6">
                    <button 
                      onClick={handleStart} 
                      disabled={isAnimating}
                      className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-2xl transition-all shadow-md disabled:opacity-50 flex justify-center items-center text-lg"
                    >
                      ▶ 실행
                    </button>
                    <button 
                      onClick={handleReset} 
                      className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-4 px-4 rounded-2xl transition-all flex justify-center items-center text-lg"
                    >
                      ↺ 초기화
                    </button>
                  </div>

                  {/* 실시간 계산 결과 */}
                  <div className="bg-slate-50 p-5 rounded-2xl space-y-4 text-sm border border-slate-100">
                    <div className="flex justify-between items-center">
                      <span className="text-slate-500 font-medium">초기 속도 ($v_0$)</span>
                      <span className="font-mono font-bold text-slate-700 bg-white px-2 py-1 rounded border border-slate-200">{speedMs.toFixed(2)} m/s</span>
                    </div>
                    <div className="flex justify-between items-center">
                      <span className="text-slate-500 font-medium">반응 거리 (직사각형)</span>
                      <span className="font-mono font-bold text-yellow-600 bg-yellow-50 px-2 py-1 rounded border border-yellow-100">{reactionDist.toFixed(1)} m</span>
                    </div>
                    <div className="flex justify-between items-center">
                      <span className="text-slate-500 font-medium">제동 거리 (삼각형)</span>
                      <span className="font-mono font-bold text-red-500 bg-red-50 px-2 py-1 rounded border border-red-100">{brakingDist.toFixed(1)} m</span>
                    </div>
                    <div className="border-t border-slate-200 pt-4 flex justify-between items-center">
                      <span className="font-extrabold text-slate-800 text-base">총 정지 거리</span>
                      <span className={`text-2xl font-black ${isCrashed ? 'text-red-600' : 'text-green-600'}`}>
                        {totalDist.toFixed(1)} <span className="text-lg">m</span>
                      </span>
                    </div>
                  </div>
                </div>

                {/* 물리 법칙 설명 패널 */}
                <div className={`p-8 rounded-3xl shadow-lg border transition-colors ${isCrashed ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200'}`}>
                  <h3 className={`text-xl font-extrabold mb-4 flex items-center ${isCrashed ? 'text-red-700' : 'text-green-700'}`}>
                    {isCrashed ? '🚨 속도를 줄여야 합니다!' : '✅ 안전한 속도입니다!'}
                  </h3>
                  <p className="text-base text-slate-700 leading-relaxed mb-6">
                    전동킥보드가 멈추기 위한 공간인 제동 거리(삼각형 넓이)는 <strong className="bg-white px-1.5 py-0.5 rounded shadow-sm border border-slate-200">초기 속도의 제곱에 비례</strong>합니다.<br/><br/>
                    속도를 20km/h에서 30km/h로 1.5배만 높여도, 면적은 2.25배로 기하급수적으로 넓어집니다.
                  </p>
                  
                  <div className="bg-white p-4 rounded-xl border border-slate-200 font-mono text-center shadow-sm">
                    <div className="text-xs text-slate-500 mb-2 font-sans font-semibold">등가속도 운동 제동거리 공식</div>
                    <div className="text-lg font-black tracking-widest text-blue-700">s = v₀² / 2a</div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
